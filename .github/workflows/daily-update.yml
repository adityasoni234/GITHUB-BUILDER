name: Daily Update

on:
  schedule:
    - cron: "30 4 * * *"   # 10:00 AM IST
    - cron: "30 8 * * *"   # 02:00 PM IST
    - cron: "30 13 * * *"  # 07:00 PM IST
    - cron: "30 16 * * *"  # 10:00 PM IST

  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "adityasoni234"
          git config user.email "adityaksoni234@gmail.com"

      - name: Update activity file
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > activity.txt

      - name: Update learning log
        run: |
          HOUR=$(date -u '+%H')

          if [ "$HOUR" = "04" ]; then
            SESSION="Morning (10:00 AM IST)"
          elif [ "$HOUR" = "08" ]; then
            SESSION="Afternoon (02:00 PM IST)"
          elif [ "$HOUR" = "13" ]; then
            SESSION="Evening (07:00 PM IST)"
          else
            SESSION="Night (10:00 PM IST)"
          fi

          {
            echo ""
            echo "## $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Session: $SESSION"
            echo "Daily AI/ML learning progress update."
            echo "Focus: GitHub automation, coding consistency, project development, and continuous learning."
          } >> learning-log.md

      - name: Commit and Push Changes
        run: |
          git add activity.txt learning-log.md

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "🚀 Auto Update - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push